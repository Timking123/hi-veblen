# ============================================
# 后台管理系统 Nginx 配置
# ============================================
# 
# 功能说明：
# 1. 前端静态文件服务（端口 80/443）
# 2. 后端 API 反向代理（代理到 localhost:3001）
# 3. HTTPS 支持（Let's Encrypt）
# 4. 安全头配置（HSTS、CSP、X-Frame-Options 等）
# 5. 文件上传大小限制（10MB）
# 6. 静态资源缓存策略
#
# 部署说明：
# 1. 将此文件复制到 /etc/nginx/sites-available/admin
# 2. 创建软链接：ln -s /etc/nginx/sites-available/admin /etc/nginx/sites-enabled/
# 3. 修改 server_name 为实际域名
# 4. 使用 certbot 申请 SSL 证书
# 5. 测试配置：nginx -t
# 6. 重载配置：systemctl reload nginx
# ============================================

# HTTP 服务器 - 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.huangyanjie.com;

    # Let's Encrypt 验证路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.huangyanjie.com;

    # ============================================
    # SSL 证书配置（Let's Encrypt）
    # ============================================
    ssl_certificate /etc/letsencrypt/live/admin.huangyanjie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.huangyanjie.com/privkey.pem;
    
    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL 会话缓存
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.huangyanjie.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================
    # 安全头配置
    # ============================================
    
    # HSTS（HTTP Strict Transport Security）
    # 强制浏览器使用 HTTPS 访问（1 年有效期）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # CSP（Content Security Policy）
    # 防止 XSS 攻击，限制资源加载来源
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    
    # X-Frame-Options
    # 防止点击劫持攻击
    add_header X-Frame-Options "DENY" always;
    
    # X-Content-Type-Options
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # X-XSS-Protection
    # 启用浏览器 XSS 过滤器
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer-Policy
    # 控制 Referrer 信息发送
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy
    # 控制浏览器功能权限
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

    # ============================================
    # 日志配置
    # ============================================
    access_log /var/log/nginx/admin_access.log;
    error_log /var/log/nginx/admin_error.log;

    # ============================================
    # 文件上传大小限制（10MB）
    # ============================================
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ============================================
    # 前端静态文件服务
    # ============================================
    location / {
        root /var/www/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 禁用缓存（HTML 文件）
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # 静态资源缓存策略
    # ============================================
    
    # JavaScript 和 CSS 文件（7 天缓存）
    location ~* \.(js|css)$ {
        root /var/www/admin;
        expires 7d;
        add_header Cache-Control "public, immutable";
        
        # 启用 gzip 压缩
        gzip on;
        gzip_vary on;
        gzip_types text/css application/javascript;
    }
    
    # 图片文件（30 天缓存）
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /var/www/admin;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # 字体文件（1 年缓存）
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        root /var/www/admin;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # 允许跨域字体加载
        add_header Access-Control-Allow-Origin "*";
    }

    # ============================================
    # 后端 API 反向代理
    # ============================================
    location /api {
        # 代理到后端服务（localhost:3001）
        proxy_pass http://127.0.0.1:3001;
        
        # HTTP 版本
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # WebSocket 支持（如果需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 禁用 API 响应缓存
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ============================================
    # 文件上传路径（特殊处理）
    # ============================================
    location /api/files/upload {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        
        # 文件上传专用设置
        client_max_body_size 10M;
        client_body_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 健康检查端点
    # ============================================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # 安全配置
    # ============================================
    
    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问备份文件
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # 禁止访问敏感文件
    location ~* \.(sql|bak|backup|log|env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# Gzip 压缩配置（全局）
# ============================================
# 注意：这些配置通常放在 nginx.conf 的 http 块中
# 如果已在主配置文件中设置，可以删除此部分
