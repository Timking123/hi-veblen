version: '3.8'

services:
  # Nginx 前端服务容器
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-nginx
    ports:
      - "80:80"      # HTTP 端口
      - "443:443"    # HTTPS 端口
    volumes:
      # SSL 证书挂载（只读）
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Nginx 配置文件（支持热更新）
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # 日志目录
      - ./logs/nginx:/var/log/nginx
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
